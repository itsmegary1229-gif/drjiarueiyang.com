<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章後台 | 楊佳叡醫師</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Inter', sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    /* ===== 登入畫面 ===== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      padding: 48px 40px;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
      width: 320px;
    }
    .login-box h1 { font-size: 20px; margin-bottom: 8px; }
    .login-box p { color: #888; font-size: 14px; margin-bottom: 28px; }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .login-box input:focus { outline: none; border-color: #4a6fa5; }
    .login-error { color: #e53e3e; font-size: 13px; margin-bottom: 12px; display: none; }

    /* ===== 後台主畫面 ===== */
    #admin-screen { display: none; }

    .admin-header {
      background: #1a2340;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 { font-size: 16px; font-weight: 400; letter-spacing: 0.05em; }
    .admin-header button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .admin-body { max-width: 900px; margin: 40px auto; padding: 0 24px; }

    /* 頁籤 */
    .tab-bar { display: flex; gap: 8px; margin-bottom: 32px; }
    .tab-btn {
      padding: 10px 24px;
      border: 1.5px solid #ddd;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #555;
    }
    .tab-btn.active { background: #1a2340; color: #fff; border-color: #1a2340; }

    /* 文章列表 */
    #tab-list { }
    .article-list { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .article-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .article-item:last-child { border-bottom: none; }
    .article-item-info { flex: 1; }
    .article-item-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .article-item-meta { font-size: 13px; color: #888; }
    .article-item-type {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-right: 8px;
      background: #e8f0fe;
      color: #1a5276;
    }
    .article-item-type.case { background: #fef3e2; color: #7d4e00; }
    .article-item-actions { display: flex; gap: 8px; }
    .btn-edit { padding: 6px 16px; background: #f0f0f0; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-delete { padding: 6px 16px; background: #fff0f0; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; color: #e53e3e; }
    .btn-edit:hover { background: #e0e0e0; }
    .btn-delete:hover { background: #ffe0e0; }

    .btn-new {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 24px;
      background: #1a2340;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-new:hover { background: #2d3a5c; }

    /* 編輯表單 */
    #tab-edit { display: none; }
    .form-section { background: #fff; border-radius: 8px; padding: 28px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .form-section h3 { font-size: 14px; font-weight: 500; color: #888; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 20px; }
    .form-row { margin-bottom: 18px; }
    .form-row label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: #fafafa;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
      outline: none;
      border-color: #4a6fa5;
      background: #fff;
    }
    .form-row textarea { min-height: 300px; resize: vertical; line-height: 1.7; }
    .form-row .hint { font-size: 12px; color: #aaa; margin-top: 5px; }

    .form-actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn-save {
      padding: 12px 32px;
      background: #1a2340;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    .btn-save:hover { background: #2d3a5c; }
    .btn-cancel {
      padding: 12px 24px;
      background: #f0f0f0;
      color: #555;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    .btn-cancel:hover { background: #e0e0e0; }

    .save-status { font-size: 14px; color: #27ae60; display: none; align-items: center; gap: 8px; }
    .save-status.error { color: #e53e3e; }

    /* 圖片說明區 */
    .image-helper {
      background: #f8f9ff;
      border: 1.5px dashed #c5d0e8;
      border-radius: 6px;
      padding: 16px;
      margin-top: 8px;
    }
    .image-helper p { font-size: 13px; color: #555; line-height: 1.8; }
    .image-helper code { background: #e8ecf5; padding: 2px 6px; border-radius: 3px; font-size: 12px; }

    /* 格式工具列 */
    .format-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .format-toolbar button {
      padding: 5px 12px;
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      color: #333;
    }
    .format-toolbar button:hover { background: #f0f4ff; border-color: #4a6fa5; color: #1a2340; }

    /* Quill 編輯器 */
    #quill-editor {
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 1.8;
      background: #fff;
    }
    .ql-toolbar { border-radius: 6px 6px 0 0 !important; border-color: #e0e0e0 !important; background: #fafafa; position: sticky; top: 0; z-index: 10; display: flex !important; flex-wrap: wrap !important; align-items: center !important; gap: 2px 0 !important; padding: 6px 8px !important; }
    .ql-container { border-radius: 0 0 6px 6px !important; border-color: #e0e0e0 !important; font-size: 15px; height: 600px; overflow-y: auto; }
    .ql-editor { min-height: 100%; line-height: 1.8; }
    .ql-editor h2 { font-size: 20px; margin: 16px 0 8px; }
    .ql-editor h3 { font-size: 17px; margin: 12px 0 6px; }
    .ql-editor p { margin-bottom: 10px; }
    .ql-editor blockquote { border-left: 3px solid #ccc; padding-left: 16px; color: #666; margin: 12px 0; }

    /* 自訂工具列按鈕（嵌入 Quill toolbar） */
    .ql-toolbar .ql-custom-btn {
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      width: auto !important;
      padding: 3px 8px !important;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      color: #444;
      border-radius: 3px;
      height: 24px;
      line-height: 1;
      white-space: nowrap;
      float: none !important;
    }
    .ql-toolbar .ql-custom-btn:hover { background: #e8e8e8; color: #1a2340; }
    .ql-toolbar .ql-custom-btn.active { background: #1a2340; color: #fff; }

    /* ql-formats 群組間距（Quill 預設用 margin-right，改用 border 做分隔線） */
    .ql-toolbar .ql-formats {
      display: inline-flex !important;
      align-items: center;
      padding-right: 10px;
      border-right: 1px solid #ccc;
      margin-right: 10px !important;
    }
    .ql-toolbar .ql-formats:last-child {
      border-right: none;
      padding-right: 0;
      margin-right: 0 !important;
    }

    /* 表格面板（已改用 HTML 區塊對話框） */

    /* bodyBlocks 編輯器容器 */
    #blocks-container {
      border: 1.5px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 6px 6px;
      background: #fff;
    }

    /* HTML 區塊佔位方塊 */
    .html-block-placeholder {
      background: #f0f0f0;
      border: 1.5px dashed #bbb;
      border-radius: 4px;
      margin: 8px 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
    }
    .html-block-placeholder:hover { background: #e8e8e8; }
    .html-block-placeholder .block-label {
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .html-block-placeholder .block-label .icon { font-size: 16px; }
    .html-block-placeholder .block-preview {
      font-size: 12px;
      color: #999;
      max-width: 400px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .html-block-placeholder .block-actions {
      display: flex;
      gap: 6px;
    }
    .html-block-placeholder .block-actions button {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #fff;
      color: #555;
    }
    .html-block-placeholder .block-actions button:hover {
      background: #f0f4ff;
      border-color: #4a6fa5;
    }
    .html-block-placeholder .block-actions .btn-del-block {
      color: #e53e3e;
      border-color: #f5c6c6;
    }
    .html-block-placeholder .block-actions .btn-del-block:hover {
      background: #fff0f0;
    }

    /* HTML 區塊編輯對話框 */
    .html-block-dialog {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .html-block-dialog.show { display: flex; }
    .html-block-dialog .dialog-inner {
      background: #fff;
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .html-block-dialog .dialog-header {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .html-block-dialog .dialog-header h3 {
      font-size: 15px;
      font-weight: 500;
      color: #1a2340;
    }
    .html-block-dialog .dialog-body {
      padding: 16px 20px;
      flex: 1;
      overflow: auto;
    }
    .html-block-dialog .dialog-body textarea {
      width: 100%;
      height: 400px;
      padding: 14px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      background: #1e1e2e;
      color: #cdd6f4;
      resize: vertical;
      tab-size: 2;
    }
    .html-block-dialog .dialog-body .hint {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
    .html-block-dialog .dialog-body .preview-area {
      margin-top: 12px;
      padding: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fafafa;
      max-height: 200px;
      overflow: auto;
      font-size: 14px;
    }
    .html-block-dialog .dialog-footer {
      padding: 12px 20px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .html-block-dialog .dialog-footer button {
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    .html-block-dialog .btn-dialog-save {
      background: #1a2340;
      color: #fff;
      border: none;
    }
    .html-block-dialog .btn-dialog-save:hover { background: #2d3a5c; }
    .html-block-dialog .btn-dialog-cancel {
      background: #f0f0f0;
      color: #555;
      border: none;
    }
    .html-block-dialog .btn-dialog-cancel:hover { background: #e0e0e0; }
    .html-block-dialog .btn-dialog-preview {
      background: #f0f4ff;
      color: #1a2340;
      border: 1px solid #c5d0e8;
    }
    .html-block-dialog .btn-dialog-preview:hover { background: #e0e8ff; }

    /* HTML 原始碼編輯器 */
    #html-source-editor {
      display: none;
      width: 100%;
      height: 600px;
      padding: 16px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      border: 1.5px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 6px 6px;
      background: #1e1e2e;
      color: #cdd6f4;
      resize: none;
      tab-size: 2;
    }

    /* 選圖按鈕 */
    .btn-pick {
      padding: 10px 20px;
      background: #f0f4ff;
      border: 1.5px solid #c5d0e8;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #1a2340;
      font-family: inherit;
    }
    .btn-pick:hover { background: #e0e8ff; }

    /* 圖片格子 */
    .picker-item {
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.15s;
      background: #f5f5f5;
    }
    .picker-item:hover { border-color: #4a6fa5; }
    .picker-item img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .picker-item-name { font-size: 11px; padding: 4px 6px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 空列表 */
    .empty-list { text-align: center; padding: 48px; color: #bbb; font-size: 14px; }
  </style>
</head>
<body>

<!-- ===== 登入畫面 ===== -->
<div id="login-screen">
  <div class="login-box">
    <h1>楊佳叡醫師</h1>
    <p>文章後台管理系統</p>
    <input type="password" id="password-input" placeholder="請輸入密碼" maxlength="20">
    <div class="login-error" id="login-error">密碼錯誤，請再試一次</div>
    <button class="btn-save" style="width:100%" onclick="login()">登入</button>
  </div>
</div>

<!-- ===== 後台主畫面 ===== -->
<div id="admin-screen">
  <div class="admin-header">
    <h1>楊佳叡醫師 ／ 文章後台</h1>
    <button onclick="logout()">登出</button>
  </div>

  <div class="admin-body">

    <!-- 頁籤 -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showTab('list')">文章列表</button>
      <button class="tab-btn" onclick="showTab('edit')" id="edit-tab-btn">＋ 新增文章</button>
    </div>

    <!-- 文章列表 -->
    <div id="tab-list">
      <div class="article-list" id="article-list">
        <div class="empty-list">載入中⋯⋯</div>
      </div>
    </div>

    <!-- 編輯表單 -->
    <div id="tab-edit">
      <div class="form-section">
        <h3>基本資訊</h3>

        <div class="form-row">
          <label>文章類型</label>
          <select id="f-type">
            <option value="blog">知識專欄</option>
            <option value="case">案例分享</option>
          </select>
        </div>

        <div class="form-row">
          <label>文章標題</label>
          <input type="text" id="f-title" placeholder="例：雙眼皮手術完整指南">
        </div>

        <div class="form-row">
          <label>發布日期</label>
          <input type="text" id="f-date" placeholder="例：2026.05.12">
        </div>

        <div class="form-row">
          <label>大分類</label>
          <select id="f-category">
            <option value="">請選擇</option>
            <option value="整形重建">整形重建</option>
            <option value="整形美容">整形美容</option>
            <option value="傷口照護">傷口照護</option>
            <option value="衛教知識">衛教知識</option>
          </select>
        </div>

        <div class="form-row">
          <label>標籤（用逗號分隔）</label>
          <input type="text" id="f-tags" placeholder="例：上眼皮手術,衛教知識">
          <div class="hint">多個標籤請用半形逗號「,」分隔，不要加 #</div>
        </div>

        <div class="form-row">
          <label>摘要（顯示在文章列表卡片）</label>
          <input type="text" id="f-excerpt" placeholder="一到兩句話簡介文章內容">
        </div>
      </div>

      <div class="form-section">
        <h3>封面圖片</h3>
        <div class="form-row">
          <button type="button" class="btn-pick" onclick="openPicker('cover')">📂 從 Google Drive 選擇封面圖</button>
        </div>
        <div id="cover-preview" style="margin-top:10px; display:none;">
          <img id="cover-preview-img" style="max-width:100%; max-height:200px; border-radius:4px; border:1px solid #eee;">
          <div style="margin-top:6px;">
            <button type="button" onclick="clearCover()" style="font-size:12px; color:#e53e3e; background:none; border:none; cursor:pointer;">✕ 移除封面圖</button>
          </div>
        </div>
        <input type="hidden" id="f-cover">
        <input type="hidden" id="f-cover-drive">
      </div>

      <div class="form-section">
        <h3>文章內文</h3>

        <div class="form-row">
          <label>內文</label>
          <div id="quill-toolbar">
            <span class="ql-formats">
              <select class="ql-header">
                <option value="2">Heading 2</option>
                <option value="3">Heading 3</option>
                <option selected>Normal</option>
              </select>
            </span>
            <span class="ql-formats">
              <button class="ql-bold"></button>
              <button class="ql-italic"></button>
              <button class="ql-underline"></button>
            </span>
            <span class="ql-formats">
              <button class="ql-list" value="ordered"></button>
              <button class="ql-list" value="bullet"></button>
            </span>
            <span class="ql-formats">
              <button class="ql-indent" value="-1"></button>
              <button class="ql-indent" value="+1"></button>
            </span>
            <span class="ql-formats">
              <button class="ql-blockquote"></button>
              <button class="ql-clean"></button>
            </span>
            <span class="ql-formats">
              <button type="button" class="ql-custom-btn" id="btn-table" title="插入 HTML 區塊">🗃️</button>
              <button type="button" class="ql-custom-btn" id="btn-html-toggle" title="HTML 原始碼">&lt;/&gt;</button>
            </span>
          </div>
          <div id="quill-editor"></div>
          <textarea id="html-source-editor" spellcheck="false"></textarea>
          <div class="hint">💡 直接在上方編輯器輸入，點工具列「🗃️ 插入 HTML 區塊」可加入表格等自訂 HTML（不會被編輯器吃掉）。</div>

          <!-- HTML 區塊編輯對話框 -->
          <div class="html-block-dialog" id="html-block-dialog">
            <div class="dialog-inner">
              <div class="dialog-header">
                <h3 id="html-dialog-title">插入 HTML 區塊</h3>
                <button onclick="closeHtmlBlockDialog()" style="background:none; border:none; font-size:20px; cursor:pointer; color:#888;">✕</button>
              </div>
              <div class="dialog-body">
                <textarea id="html-block-input" placeholder="在此貼上 HTML 原始碼（例如表格）⋯⋯" spellcheck="false"></textarea>
                <div class="hint">💡 貼上完整的 HTML 表格或任何自訂 HTML，儲存後會原封不動保留在文章中。</div>
                <div class="preview-area" id="html-block-preview" style="display:none;"></div>
              </div>
              <div class="dialog-footer">
                <button type="button" class="btn-dialog-preview" onclick="previewHtmlBlock()">預覽</button>
                <button type="button" class="btn-dialog-cancel" onclick="closeHtmlBlockDialog()">取消</button>
                <button type="button" class="btn-dialog-save" id="btn-dialog-save" onclick="saveHtmlBlock()">確認插入</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 插入圖片 -->
        <div style="background:#f0f4ff; border:1.5px solid #c5d0e8; border-radius:8px; padding:16px; margin-top:16px;">
          <div style="font-size:13px; font-weight:500; color:#1a2340; margin-bottom:12px;">🖼️ 插入圖片到內文</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script type="module">
  import { db } from "../assets/js/firebase-config.js";
  import {
    collection, getDocs, addDoc, updateDoc, deleteDoc,
    doc, orderBy, query
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  /* ===== 密碼 ===== */
  const PASSWORD = '1202';  // ★ 您可以修改這個密碼

  /* ===== Quill 富文本編輯器 ===== */
  const quill = new Quill('#quill-editor', {
    theme: 'snow',
    placeholder: '在這裡撰寫文章內容⋯⋯',
    modules: {
      toolbar: { container: '#quill-toolbar' }
    }
  });

  /* ===================================================================
     bodyBlocks 架構
     ===================================================================
     bodyBlocks 是一個陣列，每個元素代表文章的一個區塊：
     - { type: "editor", content: "<p>...</p>" } — Quill 管理的富文本
     - { type: "html",   content: "<table>...</table>" } — 原始 HTML，Quill 不碰

     在編輯器中，html 區塊顯示為灰色佔位方塊，點擊可編輯原始碼。
     儲存時同時存 bodyBlocks（新格式）和 content（向下相容）。
     =================================================================== */

  // 目前編輯中的 html 區塊資料
  let htmlBlocks = [];         // 陣列：{ id, content }
  let htmlBlockEditingId = null; // 正在編輯的 html 區塊 id（null = 新增模式）
  let htmlBlockCounter = 0;    // 用來產生唯一 ID
  let savedCursorIndex = null; // 記住開啟對話框前的游標位置

  /* ===== 綁定自訂按鈕事件 ===== */
  document.getElementById('btn-table').addEventListener('click', function(e) {
    e.stopPropagation();
    // 先記住游標位置（對話框開啟後 Quill 會失去焦點）
    const sel = quill.getSelection();
    savedCursorIndex = sel ? sel.index : quill.getLength() - 1;
    openHtmlBlockDialog(null); // null = 新增
  });
  document.getElementById('btn-html-toggle').addEventListener('click', function() {
    toggleHtmlMode();
  });

  /**
   * 找出 Quill 游標 index 所在的頂層 DOM 節點（quill.root 的直接子元素）
   * 回傳該節點；如果找不到就回傳 null
   */
  function getTopLevelBlockAtIndex(index) {
    // getLeaf 回傳 [Blot, offset]，Blot.domNode 是葉節點
    const [leaf] = quill.getLeaf(index);
    if (!leaf || !leaf.domNode) return null;

    let node = leaf.domNode;
    // 往上走到 quill.root 的直接子元素
    while (node && node.parentNode !== quill.root) {
      node = node.parentNode;
    }
    return node || null;
  }

  /* ===== HTML 區塊對話框 ===== */
  window.openHtmlBlockDialog = function(blockId) {
    const dialog = document.getElementById('html-block-dialog');
    const input = document.getElementById('html-block-input');
    const title = document.getElementById('html-dialog-title');
    const saveBtn = document.getElementById('btn-dialog-save');
    const preview = document.getElementById('html-block-preview');
    preview.style.display = 'none';

    if (blockId) {
      // 編輯既有區塊
      htmlBlockEditingId = blockId;
      const block = htmlBlocks.find(b => b.id === blockId);
      input.value = block ? block.content : '';
      title.textContent = '編輯 HTML 區塊';
      saveBtn.textContent = '確認修改';
    } else {
      // 新增區塊
      htmlBlockEditingId = null;
      input.value = '';
      title.textContent = '插入 HTML 區塊';
      saveBtn.textContent = '確認插入';
    }

    dialog.classList.add('show');
    input.focus();
  };

  window.closeHtmlBlockDialog = function() {
    document.getElementById('html-block-dialog').classList.remove('show');
    htmlBlockEditingId = null;
  };

  window.previewHtmlBlock = function() {
    const input = document.getElementById('html-block-input').value;
    const preview = document.getElementById('html-block-preview');
    preview.innerHTML = input;
    preview.style.display = 'block';
  };

  window.saveHtmlBlock = function() {
    const html = document.getElementById('html-block-input').value.trim();
    if (!html) { alert('請輸入 HTML 內容'); return; }

    if (htmlBlockEditingId) {
      // 更新既有區塊
      const block = htmlBlocks.find(b => b.id === htmlBlockEditingId);
      if (block) block.content = html;
      renderHtmlBlockPlaceholders();
    } else {
      // ===== 新增區塊：插入到游標所在位置 =====
      const blockId = 'hb_' + (++htmlBlockCounter);

      // 建立隱藏標記元素
      const markerP = document.createElement('p');
      markerP.setAttribute('data-htmlblock', blockId);
      markerP.innerHTML = '<br>';
      markerP.style.display = 'none';

      // 找到游標所在的頂層 DOM 節點，把標記插在它後面
      const cursorIdx = (savedCursorIndex != null) ? savedCursorIndex : quill.getLength() - 1;
      const targetBlock = getTopLevelBlockAtIndex(cursorIdx);

      if (targetBlock && targetBlock.nextSibling) {
        // 游標在中間某個區塊 → 插在該區塊後面
        quill.root.insertBefore(markerP, targetBlock.nextSibling);
      } else {
        // 游標在最後一個區塊或找不到 → 附加到末尾
        quill.root.appendChild(markerP);
      }

      // 把新區塊插到 htmlBlocks 陣列中正確的位置（依 DOM 順序）
      // 先找出 markerP 在所有 marker 中的 DOM 順序
      const allMarkers = Array.from(quill.root.querySelectorAll('[data-htmlblock]'));
      const domIndex = allMarkers.indexOf(markerP);
      // htmlBlocks 的順序要與 DOM 中 marker 的順序一致
      htmlBlocks.splice(domIndex, 0, { id: blockId, content: html });

      renderHtmlBlockPlaceholders();

      // 把游標移到標記之後的下一個區塊開頭
      // 找到 markerP 的下一個可見兄弟
      let nextVisible = markerP.nextElementSibling;
      while (nextVisible && nextVisible.hasAttribute('data-htmlblock')) {
        nextVisible = nextVisible.nextElementSibling;
      }
      if (nextVisible) {
        try {
          const blot = Quill.find(nextVisible);
          if (blot) {
            const idx = quill.getIndex(blot);
            quill.setSelection(idx, 0);
          }
        } catch (e) { /* 不影響功能 */ }
      }
    }

    closeHtmlBlockDialog();
  };

  window.deleteHtmlBlock = function(blockId) {
    if (!confirm('確定要移除此 HTML 區塊嗎？')) return;
    htmlBlocks = htmlBlocks.filter(b => b.id !== blockId);
    // 移除 Quill 內的隱藏標記段落
    const marker = quill.root.querySelector(`[data-htmlblock="${blockId}"]`);
    if (marker) marker.remove();
    renderHtmlBlockPlaceholders();
  };

  // 渲染所有 HTML 區塊的灰色佔位方塊（依 DOM 順序顯示在 Quill 編輯器下方）
  function renderHtmlBlockPlaceholders() {
    let container = document.getElementById('html-blocks-area');
    if (!container) {
      container = document.createElement('div');
      container.id = 'html-blocks-area';
      // 插在 Quill 容器（.ql-container）後面
      const qlContainer = document.querySelector('.ql-container');
      qlContainer.parentNode.insertBefore(container, qlContainer.nextSibling);
    }

    if (htmlBlocks.length === 0) {
      container.innerHTML = '';
      return;
    }

    // 依 DOM 中 marker 的順序排列（而非 htmlBlocks 陣列順序）
    const allMarkers = Array.from(quill.root.querySelectorAll('[data-htmlblock]'));
    const orderedBlocks = [];
    allMarkers.forEach(marker => {
      const id = marker.getAttribute('data-htmlblock');
      const block = htmlBlocks.find(b => b.id === id);
      if (block) orderedBlocks.push(block);
    });
    // 補上沒有 marker 的區塊（理論上不應發生，但做防禦）
    htmlBlocks.forEach(b => {
      if (!orderedBlocks.find(ob => ob.id === b.id)) orderedBlocks.push(b);
    });

    // 取得每個 marker 前面那段文字的末尾作為位置提示
    container.innerHTML = orderedBlocks.map((block, i) => {
      const previewText = block.content.replace(/<[^>]+>/g, '').substring(0, 80);

      // 嘗試找出此區塊前方的文字段落作為位置提示
      let positionHint = '';
      const marker = quill.root.querySelector(`[data-htmlblock="${block.id}"]`);
      if (marker) {
        let prev = marker.previousElementSibling;
        while (prev && prev.hasAttribute('data-htmlblock')) {
          prev = prev.previousElementSibling;
        }
        if (prev) {
          const prevText = (prev.textContent || '').trim();
          if (prevText) {
            positionHint = '（位於「' + prevText.substring(0, 20) + (prevText.length > 20 ? '…' : '') + '」之後）';
          }
        }
      }

      return `
        <div class="html-block-placeholder" onclick="openHtmlBlockDialog('${block.id}')">
          <div class="block-label">
            <span class="icon">📋</span>
            <span>HTML 區塊 #${i + 1}</span>
            <span class="block-preview">${positionHint || ''} ${previewText || '（空白）'}…</span>
          </div>
          <div class="block-actions" onclick="event.stopPropagation()">
            <button onclick="openHtmlBlockDialog('${block.id}')">編輯</button>
            <button class="btn-del-block" onclick="deleteHtmlBlock('${block.id}')">移除</button>
          </div>
        </div>
      `;
    }).join('');
  }

  /* ===== bodyBlocks ↔ Firestore 轉換 ===== */

  /**
   * 從目前的 Quill 編輯器 + htmlBlocks 組合出 bodyBlocks 陣列
   * 同時產出向下相容的 content 字串
   */
  function buildBodyBlocks() {
    // 如果在 HTML 模式，先同步回 Quill
    syncHtmlToQuill();

    const editorHtml = quill.root.innerHTML.trim();

    // 如果沒有任何 html 區塊，只回傳單一 editor 區塊
    if (htmlBlocks.length === 0) {
      return {
        bodyBlocks: [{ type: 'editor', content: editorHtml }],
        content: editorHtml
      };
    }

    // 有 html 區塊：依照 data-htmlblock 標記的位置拆分 Quill 內容
    // 找出所有隱藏的標記段落的位置
    const markers = quill.root.querySelectorAll('[data-htmlblock]');
    const result = [];
    let contentParts = [];

    if (markers.length === 0) {
      // 沒有標記（舊文章或標記遺失）：editor 在前，html 區塊依序附加在後
      result.push({ type: 'editor', content: editorHtml });
      contentParts.push(editorHtml);
      htmlBlocks.forEach(block => {
        result.push({ type: 'html', content: block.content });
        contentParts.push(block.content);
      });
    } else {
      // 用 DOM 順序拆分
      const children = Array.from(quill.root.children);
      let currentHtml = '';

      for (const child of children) {
        const blockId = child.getAttribute('data-htmlblock');
        if (blockId) {
          // 遇到標記：先把之前累積的 editor 內容存起來
          if (currentHtml.trim()) {
            result.push({ type: 'editor', content: currentHtml.trim() });
            contentParts.push(currentHtml.trim());
          }
          currentHtml = '';
          // 找到對應的 html 區塊
          const hb = htmlBlocks.find(b => b.id === blockId);
          if (hb) {
            result.push({ type: 'html', content: hb.content });
            contentParts.push(hb.content);
          }
        } else {
          currentHtml += child.outerHTML;
        }
      }
      // 最後的尾巴 editor 內容
      if (currentHtml.trim()) {
        result.push({ type: 'editor', content: currentHtml.trim() });
        contentParts.push(currentHtml.trim());
      }
    }

    return {
      bodyBlocks: result,
      content: contentParts.join('\n')
    };
  }

  /**
   * 從 Firestore 的 bodyBlocks（或 content）還原到編輯器
   */
  function loadBodyBlocks(data) {
    htmlBlocks = [];
    htmlBlockCounter = 0;

    if (data.bodyBlocks && Array.isArray(data.bodyBlocks) && data.bodyBlocks.length > 0) {
      // 新格式：bodyBlocks
      let editorParts = [];

      data.bodyBlocks.forEach(block => {
        if (block.type === 'html') {
          const blockId = 'hb_' + (++htmlBlockCounter);
          htmlBlocks.push({ id: blockId, content: block.content });
          // 在 editor 內容中插入一個隱藏標記段落
          editorParts.push(`<p data-htmlblock="${blockId}" style="display:none"><br></p>`);
        } else {
          editorParts.push(block.content);
        }
      });

      quill.root.innerHTML = editorParts.join('');
    } else {
      // 舊格式：只有 content 欄位（向下相容）
      quill.root.innerHTML = data.content || '';
    }

    renderHtmlBlockPlaceholders();
  }

  /* ===== HTML 原始碼切換 ===== */
  let isHtmlMode = false;

  window.toggleHtmlMode = function() {
    const quillContainer = document.querySelector('.ql-container');
    const sourceEditor = document.getElementById('html-source-editor');
    const toggleBtn = document.getElementById('btn-html-toggle');

    if (!isHtmlMode) {
      // 視覺模式 → HTML 模式（不做 formatHtml 避免空行問題）
      sourceEditor.value = quill.root.innerHTML;
      quillContainer.style.display = 'none';
      sourceEditor.style.display = 'block';
      toggleBtn.classList.add('active');
      toggleBtn.innerHTML = '✏️ 視覺模式';
      isHtmlMode = true;
    } else {
      // HTML 模式 → 視覺模式
      quill.root.innerHTML = sourceEditor.value;
      sourceEditor.style.display = 'none';
      quillContainer.style.display = 'block';
      toggleBtn.classList.remove('active');
      toggleBtn.innerHTML = '&lt;/&gt;';
      isHtmlMode = false;
    }
  };

  // 確保儲存時如果在 HTML 模式，先同步內容回 Quill
  function syncHtmlToQuill() {
    if (isHtmlMode) {
      quill.root.innerHTML = document.getElementById('html-source-editor').value;
    }
  }

    const val = document.getElementById('password-input').value;

  /* ===== Google Drive 圖片選取器 ===== */
  const API_KEY = 'AIzaSyB9H8rJcK-OlUXopY75L9QAa5MeQ23e8mU';

  let pickerTarget = 'cover'; // 'cover' 或 'content'

  function fileIdToUrl(fileId) {

  window.openPicker = async function(target) {
    pickerTarget = target;
    const modal = document.getElementById('picker-modal');

    title.textContent = target === 'cover' ? '選擇封面圖片' : '選擇插入圖片';
    modal.style.display = 'flex';

    const folderId = target === 'cover' ? FOLDER_COVERS : FOLDER_ARTICLES;

    // 有快取就直接用
    if (imageCache[folderId]) {
      renderPickerGrid(imageCache[folderId]);
      return;
    }

    grid.innerHTML = '<div style="text-align:center; padding:40px; color:#aaa; grid-column:1/-1;">載入圖片中⋯⋯</div>';

    try {
      const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'image/'+and+trashed=false&fields=files(id,name,thumbnailLink)&orderBy=createdTime+desc&pageSize=100&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!data.files || data.files.length === 0) {
        grid.innerHTML = '<div style="text-align:center; padding:40px; color:#aaa; grid-column:1/-1;">資料夾裡還沒有圖片<br><br>請先上傳圖片到對應的 Google Drive 資料夾</div>';

  function renderPickerGrid(files) {

  window.selectImage = function(fileId, fileName) {

  window.closePicker = function() {

  /* ===== Google Drive 網址轉換工具（保留供內部使用）===== */

  function driveUrlToImage(driveUrl) {
    const match = driveUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (!match) return null;
    return `https://lh3.googleusercontent.com/d/${match[1]}`;
  }

    const input = document.getElementById('f-cover-drive').value.trim();

    // 在 Quill 游標位置插入圖片
    const range = quill.getSelection(true);

    if (caption) {
      quill.insertText(range.index + 2, caption + '\n', { italic: true, color: '#888' });
    }
    quill.setSelection(range.index + (caption ? 3 : 2));

    document.getElementById('img-drive-url').value = '';
    document.getElementById('img-caption').value = '';
  };

  /* ===== 頁籤切換 ===== */
  window.showTab = function(tab) {

      document.getElementById('tab-edit').style.display = 'block';
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }
  };

  /* ===== 新增文章 ===== */
  let editingId = null;

  // 重設 HTML 模式狀態
  function resetHtmlMode() {
    if (isHtmlMode) {
      isHtmlMode = false;
      document.querySelector('.ql-container').style.display = 'block';
      document.getElementById('html-source-editor').style.display = 'none';
      const toggleBtn = document.getElementById('btn-html-toggle');
      toggleBtn.classList.remove('active');
      toggleBtn.innerHTML = '&lt;/&gt;';
    }
  }

  window.newArticle = function() {
    editingId = null;
    resetHtmlMode();
    document.getElementById('f-type').value = 'blog';
    document.getElementById('f-title').value = '';
    document.getElementById('f-date').value = getTodayDate();
    document.getElementById('f-category').value = '';
    document.getElementById('f-tags').value = '';
    document.getElementById('f-excerpt').value = '';
    document.getElementById('f-cover').value = '';
    document.getElementById('cover-preview').style.display = 'none';
    quill.setContents([]);
    htmlBlocks = [];
    htmlBlockCounter = 0;
    renderHtmlBlockPlaceholders();
    document.getElementById('edit-tab-btn').textContent = '＋ 新增文章';
    showTab('edit');
  };

  function getTodayDate() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}.${m}.${day}`;
  }

  /* ===== 儲存文章 ===== */
  window.saveArticle = async function() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { alert('請填入文章標題'); return; }

    // 組合 bodyBlocks 和向下相容的 content
    const { bodyBlocks, content } = buildBodyBlocks();

    const tagsRaw = document.getElementById('f-tags').value.trim();
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

    const data = {
      type:       document.getElementById('f-type').value,
      title:      title,
      date:       document.getElementById('f-date').value.trim(),
      category:   document.getElementById('f-category').value,
      tags:       tags,
      excerpt:    document.getElementById('f-excerpt').value.trim(),
      coverUrl:   document.getElementById('f-cover').value.trim(),
      content:    content,
      bodyBlocks: bodyBlocks,
    };

    const statusEl = document.getElementById('save-status');
    statusEl.style.display = 'flex';
    statusEl.className = 'save-status';
    statusEl.textContent = '儲存中⋯⋯';

    try {
      if (editingId) {
        await updateDoc(doc(db, 'articles', editingId), data);
      } else {
        await addDoc(collection(db, 'articles'), data);
      }
      statusEl.textContent = '✓ 已成功發布！';
      setTimeout(() => {
        statusEl.style.display = 'none';
        showTab('list');
        loadArticles();
      }, 1500);
    } catch (err) {
      console.error(err);
      statusEl.className = 'save-status error';
      statusEl.textContent = '儲存失敗，請再試一次';
    }
  };

  /* ===== 取消編輯 ===== */
  window.cancelEdit = function() {
    showTab('list');
  };

  /* ===== 讀取文章列表 ===== */
  async function loadArticles() {
    const listEl = document.getElementById('article-list');
    listEl.innerHTML = '<div class="empty-list">載入中⋯⋯</div>';

    try {
      const q = query(collection(db, 'articles'), orderBy('date', 'desc'));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        listEl.innerHTML = '<div class="empty-list">尚無文章，點「＋ 新增文章」開始撰寫</div>';
        return;
      }

      listEl.innerHTML = snapshot.docs.map(d => {
        const data = d.data();
        const typeLabel = data.type === 'case' ? '案例分享' : '知識專欄';
        const typeClass = data.type === 'case' ? 'case' : '';
        return `
          <div class="article-item">
            <div class="article-item-info">
              <div class="article-item-title">${data.title || '（未命名）'}</div>
              <div class="article-item-meta">
                <span class="article-item-type ${typeClass}">${typeLabel}</span>
                ${data.date || ''}
                ${data.tags && data.tags.length ? ' ／ ' + data.tags.map(t => '#' + t).join(' ') : ''}
              </div>
            </div>
            <div class="article-item-actions">
              <button class="btn-edit" onclick="editArticle('${d.id}')">編輯</button>
              <button class="btn-delete" onclick="deleteArticle('${d.id}', '${(data.title || '').replace(/'/g, '')}')">刪除</button>
            </div>
          </div>
        `;
      }).join('');

    } catch (err) {
      console.error(err);
      listEl.innerHTML = '<div class="empty-list">讀取失敗，請重新整理</div>';
    }
  }

  /* ===== 編輯文章 ===== */
  window.editArticle = async function(id) {
    const docSnap = await (await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")).getDoc(doc(db, 'articles', id));
    if (!docSnap.exists()) return;
    const data = docSnap.data();

    editingId = id;
    resetHtmlMode();
    document.getElementById('f-type').value = data.type || 'blog';
    document.getElementById('f-title').value = data.title || '';
    document.getElementById('f-date').value = data.date || '';
    document.getElementById('f-category').value = data.category || '';
    document.getElementById('f-tags').value = (data.tags || []).join(',');
    document.getElementById('f-excerpt').value = data.excerpt || '';
    document.getElementById('f-cover').value = data.coverUrl || '';
    if (data.coverUrl) {
      document.getElementById('cover-preview-img').src = data.coverUrl;
      document.getElementById('cover-preview').style.display = 'block';
    } else {
      document.getElementById('cover-preview').style.display = 'none';
    }

    // 使用 bodyBlocks 架構載入（向下相容舊 content）
    loadBodyBlocks(data);

    document.getElementById('edit-tab-btn').textContent = '✏️ 編輯文章';
    showTab('edit');
  };

  /* ===== 刪除文章 ===== */
  window.deleteArticle = async function(id, title) {
    if (!confirm(`確定要刪除「${title}」嗎？此操作無法復原。`)) return;
    try {
      await deleteDoc(doc(db, 'articles', id));
      loadArticles();
    } catch (err) {
      alert('刪除失敗，請再試一次');
    }
  };

</script>
</body>
</html>
